<section class="section trust-section" id="vorteile">
  <div class="container">
    <div class="intro" appReveal>
      <p class="eyebrow">Warum RichardAI</p>
      <h2 class="heading">Drei Versprechen, die wir einhalten.</h2>
    </div>

    <div class="row g-4 grid-wrapper">
      @for (point of points; track point.id; let i = $index) {
        <div class="col-12 col-md-4" appReveal [revealDelay]="i * 100">
          <div class="point">
            <svg class="point-icon" viewBox="0 0 40 40" aria-hidden="true">
              @switch (point.id) {
                @case ('zentral') {
                  <g class="shape">
                    <circle cx="20" cy="20" r="3.2" class="dot" />
                    <circle cx="10" cy="10" r="2" class="dot" />
                    <circle cx="30" cy="10" r="2" class="dot" />
                    <circle cx="20" cy="32" r="2" class="dot" />
                    <line x1="20" y1="20" x2="10" y2="10" />
                    <line x1="20" y1="20" x2="30" y2="10" />
                    <line x1="20" y1="20" x2="20" y2="32" />
                  </g>
                }
                @case ('ruhig') {
                  <g class="shape">
                    <circle cx="20" cy="20" r="4" class="dot" />
                    <circle cx="20" cy="20" r="10" class="ring" />
                    <circle cx="20" cy="20" r="16" class="ring ring-outer" />
                  </g>
                }
                @case ('sicher') {
                  <g class="shape">
                    <path d="M20 6 L32 11 V19 C32 27 27 32 20 34 C13 32 8 27 8 19 V11 Z" />
                    <polyline points="15,20 18.5,23.5 26,15" />
                  </g>
                }
              }
            </svg>
            <h3 class="point-title">{{ point.title }}</h3>
            <p class="point-description">{{ point.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
