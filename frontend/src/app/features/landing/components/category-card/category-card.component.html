<article class="card card-{{ category.id }}" [class.featured]="!!category.route" [style.transform]="cardTransform()">
  @if (category.route) {
    <span class="badge">Verfügbar</span>
  }

  <svg class="icon" viewBox="0 0 40 40" aria-hidden="true">
    <circle cx="20" cy="20" r="19" class="icon-bg" />
    <g transform="translate(20,20) scale(1.85)">
      @switch (category.id) {
        @case ('geld') {
          <g class="icon-shape">
            <rect x="-8" y="-9" width="10" height="13" rx="1.5" />
            <line x1="-6" y1="-5.5" x2="0" y2="-5.5" />
            <line x1="-6" y1="-2" x2="0" y2="-2" />
            <circle cx="6" cy="6" r="5.5" />
            <line x1="6" y1="3.2" x2="6" y2="8.8" />
            <line x1="3.4" y1="6" x2="8.6" y2="6" />
          </g>
        }
        @case ('planung') {
          <g class="icon-shape">
            <rect x="-9" y="-6" width="18" height="15" rx="2" />
            <line x1="-9" y1="-1.5" x2="9" y2="-1.5" />
            <line x1="-4.5" y1="-9" x2="-4.5" y2="-6" />
            <line x1="4.5" y1="-9" x2="4.5" y2="-6" />
            <circle cx="3.2" cy="4.5" r="1.6" class="icon-dot" />
          </g>
        }
        @case ('haushalt') {
          <g class="icon-shape">
            <polyline points="-9,-1 0,-10 9,-1" />
            <rect x="-6.5" y="-1" width="13" height="10" rx="0.5" />
            <rect x="-1.6" y="3" width="3.2" height="6" />
          </g>
        }
        @case ('info') {
          <g class="icon-shape">
            <circle cx="0" cy="0" r="2.6" class="icon-dot" />
            <circle cx="0" cy="-8.5" r="1.9" class="icon-dot" />
            <circle cx="7.4" cy="4.3" r="1.9" class="icon-dot" />
            <circle cx="-7.4" cy="4.3" r="1.9" class="icon-dot" />
            <line x1="0" y1="0" x2="0" y2="-8.5" />
            <line x1="0" y1="0" x2="7.4" y2="4.3" />
            <line x1="0" y1="0" x2="-7.4" y2="4.3" />
          </g>
        }
      }
    </g>
  </svg>

  <h3 class="title">{{ category.title }}</h3>
  <p class="description">{{ category.description }}</p>

  <ul class="bullets">
    @for (bullet of category.bullets; track bullet) {
      <li>{{ bullet }}</li>
    }
  </ul>

  @if (category.route) {
    <a class="open-link" [routerLink]="category.route">
      Öffnen
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12" />
        <polyline points="12,5 19,12 12,19" />
      </svg>
    </a>
  }
</article>
