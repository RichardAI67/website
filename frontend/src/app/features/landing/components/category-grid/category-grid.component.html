<section class="section category-section" id="kategorien">
  <div class="container">
    <div class="intro">
      <p class="eyebrow">Vier Bereiche, ein Überblick</p>
      <h2 class="heading">
        Alles, was zu deinem Alltag gehört — endlich an einem Ort.
      </h2>
    </div>

    <div class="row g-4 grid-wrapper">
      @for (category of categories; track category.id) {
        <div class="col-12 col-md-6">
          <app-category-card [category]="category" />
        </div>
      }
    </div>
  </div>
</section>
